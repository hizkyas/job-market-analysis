name: Job Market Analysis CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:               # optional scraper schedule (weekly)
    - cron: '0 6 * * 1'  # every Monday at 6:00 UTC

jobs:

  lint-test:
    name: Lint & Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest tests/

  deploy-streamlit:
    name: Deploy Streamlit Dashboard
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'   # only deploy on main branch
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to Streamlit Cloud
        run: |
          echo "This step is a placeholder."
          echo "Use Streamlit Cloud GitHub integration or API to deploy your app."

  scheduled-scraper:
    name: Update Jobs Data Weekly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper & Clean Data
        run: |
          python scripts/scrape_jobs.py
          python scripts/clean_data.py

      - name: Commit Updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs_raw.csv data/jobs_clean.csv
          git commit -m "Weekly update of job data" || echo "No changes to commit"
          git push origin main